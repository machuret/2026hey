# ═══════════════════════════════════════════════════════════════════════════
# Netlify configuration for heymoreleads
#
# Serverless function timeouts:
#   - Free tier: 10s default, 26s max (synchronous)
#   - Pro tier:  26s default, 300s max (synchronous), 900s background
#
# Enrichment routes (/api/engine/jobs/analyze, /find-dm) can take up to 30s
# when processing 3-5 jobs in parallel through OpenAI/Apollo. We chunk
# client-side to 3 jobs/request but still need every second of timeout.
# ═══════════════════════════════════════════════════════════════════════════

[build]
  command = "npm run build"

# Bump ALL function timeouts to max allowed. Netlify will cap this at your
# plan's ceiling (26s free, 300s pro), so it's safe to set high.
[functions]
  node_bundler = "esbuild"

# Per-route overrides for the slowest endpoints. These are the ones that
# actually need it; everything else finishes in <1s.
[functions."api/engine/jobs/analyze"]
  timeout = 300

[functions."api/engine/jobs/find-dm"]
  timeout = 300

[functions."api/engine/smartlead"]
  timeout = 300

[functions."api/engine/jobs/push-to-crm"]
  timeout = 60
